# Build cross-source search index from councilofelders/meetups slide PDFs
#
# Runs weekly (Monday 06:00 UTC), on manual trigger (workflow_dispatch),
# and when the index file itself is pushed (to re-crawl after merge).
#
# 1. Checkout the meetups repo (shallow, separate checkout)
# 2. Run the indexer Python script
# 3. Commit the output JSON to the site repo

name: Build cross-source search index

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:        # manual trigger
  push:
    paths:
      - 'assets/search/cross-source-index.json'  # re-crawl when index definition changes

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout meetups repo
        uses: actions/checkout@v4
        with:
          repository: councilofelders/meetups
          path: _meetups_src
          fetch-depth: 1

      - name: Run indexer
        run: python3 scripts/build-cross-source-index.py _meetups_src assets/search/cross-source-index.json

      - name: Commit index JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update cross-source search index [skip ci]'
          file_pattern: assets/search/cross-source-index.json
